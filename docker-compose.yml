version: "3.8"
services:
  influxdb:
    image: influxdb:2.7.1
    restart: always
    container_name: influxdb
    ports:
      - '8086:8086'
    volumes:
      - influxdb_storage:/var/lib/influxdb
    environment:
      - INFLUXDB_DB=db0
      - INFLUXDB_ADMIN_USER=${INFLUXDB_USERNAME}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_PASSWORD}
    labels:
      - "net.juniper.framework=HAWKSIGHT"
  grafana:
    image: grafana/grafana:10.0.5
    restart: always
    container_name: grafana
    ports:
      #- '8080:3000'
      - '8080:8080'
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./grafana/certs/auto-vm.englab.juniper.net.key:/etc/grafana/auto-vm.englab.juniper.net.key
      - ./grafana/certs/auto-vm.englab.juniper.net.pem:/etc/grafana/auto-vm.englab.juniper.net.pem
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    labels:
      - "net.juniper.framework=HAWKSIGHT"
volumes:
  influxdb_storage:
  grafana_storage:

